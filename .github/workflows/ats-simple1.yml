name: Build Apache Traffic Server

on:
  workflow_dispatch:
    inputs:
      rocky_versions:
        description: 'Rocky Linux versions (comma-separated: 8,9,10)'
        required: true
        default: '8,9,10'
        type: string

jobs:
  discover-versions:
    runs-on: ubuntu-latest
    outputs:
      rocky_versions: ${{ steps.set-rocky.outputs.rocky_versions }}
    steps:
      - name: Set Rocky Linux versions
        id: set-rocky
        run: |
          ROCKY_VERSIONS='${{ github.event.inputs.rocky_versions }}'
          ROCKY_JSON=$(echo $ROCKY_VERSIONS | jq -R -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
          echo "rocky_versions=$ROCKY_JSON" >> $GITHUB_OUTPUT
          echo "Rocky Linux versions: $ROCKY_JSON"

  build-ats:
    needs: discover-versions
    strategy:
      fail-fast: false
      matrix:
        rocky_version: ${{ fromJson(needs.discover-versions.outputs.rocky_versions) }}
    
    runs-on: ubuntu-latest
    container:
      image: rockylinux:${{ matrix.rocky_version }}
    
    steps:
      - name: Install git and basic tools
        run: |
          dnf install -y git wget jq

      - name: Clone Traffic Server repository
        run: |
          # Clones your specific fork
          git clone https://github.com/mkrug1981/trafficserver.git
          cd trafficserver
          # Checks out the branch/tag selected in the 'Use workflow from' dropdown
          git checkout ${{ github.ref_name }}
          echo "Building ATS from selected reference: ${{ github.ref_name }}"
          git log -1 --oneline
          git describe --tags --always

      - name: Install dependencies
        run: |
          dnf install -y epel-release
          dnf config-manager --set-enabled crb 2>/dev/null || dnf config-manager --set-enabled powertools 2>/dev/null || true
          dnf groupinstall -y "Development Tools"
          
          dnf install -y \
            gcc gcc-c++ cmake ninja-build make pkgconfig openssl-devel \
            pcre-devel pcre2-devel libcap-devel hwloc-devel libcurl-devel \
            ncurses-devel tcl-devel expat-devel perl-ExtUtils-MakeMaker \
            flex bison git zlib-devel libxml2-devel libunwind-devel \
            libyaml-devel python3 python3-pip python3-devel autoconf \
            automake libtool libmaxminddb-devel luajit-devel jansson-devel \
            brotli-devel
          
          dnf install -y liburing-devel 2>/dev/null || echo "liburing-devel not available"
          dnf install -y yaml-cpp-devel 2>/dev/null || echo "yaml-cpp-devel not available"

      - name: Configure ATS with CMake
        run: |
          cd trafficserver
          cmake -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/trafficserver \
            -DENABLE_EXPERIMENTAL_PLUGINS=ON \
            -DENABLE_HWLOC=ON \
            -DENABLE_SYSTEM_STATS=ON \
            -DENABLE_RATE_LIMIT=ON \
            -DENABLE_REDO_CACHE_LOOKUP=ON \
            -DENABLE_MONEY_TRACE=ON \
            -DENABLE_MAXMIND_ACL=ON \
            -DENABLE_HTTP_STATS=ON \
            -DENABLE_FQ_PACING=ON \
            -DENABLE_ACCESS_CONTROL=ON \
            -DENABLE_BLOCK_ERRORS=ON \
            -DENABLE_TXN_BOX=ON \
            -GNinja

      - name: Build Apache Traffic Server
        run: |
          cd trafficserver
          cmake --build build-release -j$(nproc)

      - name: Run tests
        run: |
          cd trafficserver
          cmake --build build-release --target test || true

      - name: Install Apache Traffic Server
        run: |
          cd trafficserver
          cmake --build build-release --target install

      - name: Get ATS version and info
        id: ats_info
        run: |
          cd trafficserver
          BINARY_VERSION=$(/opt/trafficserver/bin/traffic_server --version | head -n1 | awk '{print $4}')
          GIT_HASH=$(git rev-parse --short HEAD)
          
          echo "version=$BINARY_VERSION" >> $GITHUB_OUTPUT
          echo "git_hash=$GIT_HASH" >> $GITHUB_OUTPUT
          echo "Building: $BINARY_VERSION ($GIT_HASH) on Rocky ${{ matrix.rocky_version }}"
