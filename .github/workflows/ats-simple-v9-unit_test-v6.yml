name: Build Apache Traffic Server RPM v9v9

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      ats_branch:
        description: "Branch in mkrug1981/trafficserver"
        required: true
        default: "11-dev"
        type: string
      rocky_versions:
        description: "Rocky Linux versions (comma-separated: 8,9,10)"
        required: true
        default: "8,9,10"
        type: string
      build_release:
        description: "RPM release number"
        required: true
        default: "11"
        type: string
      enable_jemalloc:
        description: "Enable jemalloc"
        required: false
        default: "false"
        type: string

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      rocky_versions: ${{ steps.rocky.outputs.rocky_versions }}

    steps:
      - name: Prepare Rocky matrix
        id: rocky
        run: |
          set -euo pipefail
          ROCKY_JSON=$(printf '%s' '${{ inputs.rocky_versions }}' | jq -R -c '
            split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))
          ')
          echo "rocky_versions=$ROCKY_JSON" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix:
        rocky: ${{ fromJson(needs.prepare-matrix.outputs.rocky_versions) }}

    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:${{ matrix.rocky }}

    steps:
      - name: Install Base Tools
        run: |
          set -euo pipefail
          dnf install -y dnf-plugins-core epel-release git wget jq rpm-build gcc make which file tar gzip python3

      - name: Clone Repository
        run: |
          set -euo pipefail
          git clone https://github.com/mkrug1981/trafficserver.git
          cd trafficserver
          git checkout "${{ inputs.ats_branch }}"

      - name: Install Build Dependencies
        run: |
          set -euo pipefail
          dnf groupinstall -y "Development Tools"
          dnf install -y gcc gcc-c++ cmake ninja-build make pkgconfig openssl-devel \
            pcre2-devel libcap-devel hwloc-devel libcurl-devel \
            ncurses-devel tcl-devel expat-devel perl-ExtUtils-MakeMaker \
            flex bison zlib-devel libxml2-devel libunwind-devel \
            libyaml-devel python3 python3-pip python3-devel autoconf \
            automake libtool systemd-rpm-macros patchelf

      - name: Build ATS
        run: |
          set -euo pipefail
          cd trafficserver
          cmake -B build -DCMAKE_INSTALL_PREFIX=/opt/trafficserver -GNinja
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Create RPM spec
        run: |
          set -euo pipefail

          mkdir -p ~/rpmbuild/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}

          VERSION=$(/opt/trafficserver/bin/traffic_server --version 2>&1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          RELEASE="${{ inputs.build_release }}"
          HASH=$(cd trafficserver && git rev-parse --short=10 HEAD)
          DATE_STR=$(date +"%a %b %d %Y")

          export VERSION RELEASE HASH DATE_STR

          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent
          import os

          spec = dedent(f"""
          Name: trafficserver
          Version: {os.environ['VERSION']}
          Release: {os.environ['RELEASE']}%{{?dist}}
          Summary: Apache Traffic Server
          License: Apache-2.0
          BuildArch: x86_64

          %description
          Apache Traffic Server

          %install
          rm -rf %{{buildroot}}
          mkdir -p %{{buildroot}}/opt
          cp -a /opt/trafficserver %{{buildroot}}/opt/

          mkdir -p %{{buildroot}}/opt/trafficserver/var/log/trafficserver
          mkdir -p %{{buildroot}}/opt/trafficserver/var/cache/trafficserver
          mkdir -p %{{buildroot}}/opt/trafficserver/var/trafficserver

          mkdir -p %{{buildroot}}/etc/sysconfig
          echo 'TS_DAEMON_ARGS=""' > %{{buildroot}}/etc/sysconfig/trafficserver

          mkdir -p %{{buildroot}}/usr/lib/systemd/system
          cat > %{{buildroot}}/usr/lib/systemd/system/trafficserver.service <<'EOF'
          [Unit]
          Description=Apache Traffic Server
          After=network.target

          [Service]
          Type=simple
          User=trafficserver
          Group=trafficserver
          ExecStart=/opt/trafficserver/bin/traffic_server \
            --bind_stdout /opt/trafficserver/var/log/trafficserver/traffic.out \
            --bind_stderr /opt/trafficserver/var/log/trafficserver/traffic.out
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          %pre
          getent group trafficserver >/dev/null || groupadd -r trafficserver
          getent passwd trafficserver >/dev/null || useradd -r -g trafficserver -d /opt/trafficserver/var/cache/trafficserver -s /sbin/nologin trafficserver

          %post
          mkdir -p \
            /opt/trafficserver/var/log/trafficserver \
            /opt/trafficserver/var/cache/trafficserver \
            /opt/trafficserver/var/trafficserver

          chown -R trafficserver:trafficserver \
            /opt/trafficserver/var/log/trafficserver \
            /opt/trafficserver/var/cache/trafficserver \
            /opt/trafficserver/var/trafficserver || true

          systemctl daemon-reload || true
          systemctl enable trafficserver || true

          %files
          /opt/trafficserver
          %dir %attr(0755,trafficserver,trafficserver) /opt/trafficserver/var
          %dir %attr(0755,trafficserver,trafficserver) /opt/trafficserver/var/log
          %dir %attr(0755,trafficserver,trafficserver) /opt/trafficserver/var/log/trafficserver
          %dir %attr(0755,trafficserver,trafficserver) /opt/trafficserver/var/cache
          %dir %attr(0755,trafficserver,trafficserver) /opt/trafficserver/var/cache/trafficserver
          %dir %attr(0755,trafficserver,trafficserver) /opt/trafficserver/var/trafficserver
          /usr/lib/systemd/system/trafficserver.service
          %config(noreplace) /etc/sysconfig/trafficserver

          %changelog
          * {os.environ['DATE_STR']} CI Build
          """)

          Path.home().joinpath("rpmbuild/SPECS/trafficserver.spec").write_text(spec)
          PY

      - name: Build RPM
        run: |
          rpmbuild -bb ~/rpmbuild/SPECS/trafficserver.spec --define "_topdir $HOME/rpmbuild"

      - name: Upload RPM
        uses: actions/upload-artifact@v6
        with:
          name: trafficserver-rpm
          path: ~/rpmbuild/RPMS/**/*.rpm
